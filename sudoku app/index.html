<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Sudoku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="resume-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Saved Game Detected</h3>
                <p>Would you like to resume your previous game or start a fresh one?</p>
                <div class="modal-buttons">
                    <button id="btn-resume" class="btn primary">Continue Game</button>
                    <button id="btn-new-past" class="btn secondary">New Game</button>
                </div>
            </div>
        </div>

        <header>
            <div class="controls-top">
                <select id="difficulty-select">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
                <button id="btn-new" class="btn secondary">New Game</button>
            </div>
            
            <div class="status-bar">
                <div id="timer" class="timer">00:00</div>
                <button id="btn-pause" class="btn-icon" title="Pause Game">
                    <svg id="pause-icon" viewBox="0 0 24 24" width="18" height="18"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div id="hint-count" class="hint-count">Hints: 3/3</div>
            </div>
        </header>

        <main>
            <div id="sudoku-board" class="board"></div>
            
            <div id="pause-overlay" class="overlay hidden">
                <div class="overlay-content">
                    <p>Game Paused</p>
                    <button id="btn-resume-icon" class="btn primary">Resume</button>
                </div>
            </div>
            
            <div id="win-overlay" class="overlay hidden">
                <div class="overlay-content">
                    <h2>Solved!</h2>
                    <p id="win-time">Final Time: 00:00</p>
                    <button id="btn-win-close" class="btn primary">Play Again</button>
                </div>
            </div>
        </main>

        <div class="action-panel">
            <button id="btn-check" class="btn action-btn">Check</button>
            <button id="btn-notes" class="btn action-btn toggle-btn">
                Notes: <span id="notes-status">OFF</span>
            </button>
            <button id="btn-hint" class="btn action-btn">Hint</button>
        </div>

        <div class="keypad">
            <button class="key-btn" data-val="1">1</button>
            <button class="key-btn" data-val="2">2</button>
            <button class="key-btn" data-val="3">3</button>
            <button class="key-btn" data-val="4">4</button>
            <button class="key-btn" data-val="5">5</button>
            <button class="key-btn" data-val="6">6</button>
            <button class="key-btn" data-val="7">7</button>
            <button class="key-btn" data-val="8">8</button>
            <button class="key-btn" data-val="9">9</button>
            <button class="key-btn erase-btn" data-val="erase">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H7.07L2.4 12l4.66-7H22v14zm-11.59-2L14 13.41 17.59 17 19 15.59 15.41 12 19 8.41 17.59 7 14 10.59 10.41 7 9 8.41 12.59 12 9 15.59 10.41 17z"/></svg>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
